<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация</title>
  <style>
    :root{
      --gray-50: #f7f7f7;
      --gray-100: #e6e6e6;
      --gray-300: #c9cbd1;
      --gray-500: #7a7f86;
      --gray-700: #49535b;
      --orange-400: #ff9b2d;
      --orange-500: #ff7a0a;
      --orange-600: #e15a00;
      --bg: #121212;
      --card: #1e1e1e;
      --text: #f5f5f5;
      --muted: #bdbdbd;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }

    body {
      background: radial-gradient(circle at 20% 0%, rgba(255,122,10,0.15), transparent 40%), 
                  radial-gradient(circle at 80% 100%, rgba(255,122,10,0.12), transparent 40%),
                  #0f0f0f;
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 40px 16px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      padding: 28px 28px 34px;
      border: 1px solid rgba(255, 140, 0, 0.25);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .brand .logo {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      background: linear-gradient(135deg, #ff7a0a, #e65a00);
      display: inline-block;
    }

    .brand h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0;
      color: #f7f7f7;
    }

    .subtitle {
      font-size: 12.5px;
      color: var(--muted);
      margin-top: 4px;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      font-size: 12px;
      color: #d5d5d5;
      display: block;
      margin-bottom: 6px;
    }

    .input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      font-size: 14px;
      background: #1a1a1a;
      color: #f5f5f5;
      transition: border-color .2s, box-shadow .2s;
    }

    .input:focus {
      outline: none;
      border-color: #ff9b2d;
      box-shadow: 0 0 0 3px rgba(255, 154, 45, 0.25);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .button {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      color: #1a0a00;
      background: linear-gradient(135deg, #ff9b2d, #e06700);
      transition: transform .05s ease-in-out;
    }

    .button:hover {
      filter: brightness(1.03);
    }

    .button:active {
      transform: translateY(1px);
    }

    .text-muted {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 6px;
    }

    .terms {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #d5d5d5;
    }

    .checkbox {
      width: 16px;
      height: 16px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #7a7f86;
    }

    @media (max-width: 520px) {
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="card" aria-label="Форма регистрации">
    <div class="brand" aria-label="Бренд">
      <span class="logo" aria-hidden="true"></span>
      <div>
        <h1>Регистрация</h1>
        <div class="subtitle">Создайте учетную запись и начните пользоваться</div>
      </div>
    </div>

    <form action="#" method="post" autocomplete="off" novalidate>
      <div>
        <label for="username">Имя пользователя</label>
        <input id="username" class="input" type="text" name="username" placeholder="например, user123" required>
      </div>

      <div class="row">
        <div>
          <label for="email">Email</label>
          <input id="email" class="input" type="email" name="email" placeholder="name@example.com" required>
        </div>
        <div>
          <label for="phone">Телефон (опционально)</label>
          <input id="phone" class="input" type="tel" name="phone" placeholder="+7 900 000-00-00">
        </div>
      </div>

      <div class="row">
        <div>
          <label for="password">Пароль</label>
          <input id="password" class="input" type="password" name="password" placeholder="Минимум 8 символов" required>
        </div>
        <div>
          <label style="visibility:hidden;">Подтверждение</label>
          <input type="hidden">
        </div>
      </div>
	<div>
          <label for="confirm">Подтверждение пароля</label>
          <input id="confirm" class="input" type="password" name="confirm" placeholder="Повторите пароль" required>
        </div>
      <div class="terms" aria-label="Согласие на условия">
        <input class="checkbox" type="checkbox" id="agree" required>
        <label for="agree" style="margin:0;">Я соглашаюсь с правилами использования</label>
      </div>

      <button class="button" type="submit">Зарегистрироваться</button>

      <div class="text-muted" aria-live="polite">
        Уже есть аккаунт? <a href="#" style="color:var(--orange-400); text-decoration: none;">Войти</a>
      </div>
    </form>
  </div>
</body>
</html>
